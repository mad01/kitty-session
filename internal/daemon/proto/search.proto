syntax = "proto3";

package daemon;

option go_package = "github.com/mad01/kitty-session/internal/daemon/proto";

service SearchDaemon {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Count(CountRequest) returns (CountResponse);
  rpc Validate(ValidateRequest) returns (ValidateResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message SearchRequest {
  string pattern = 1;
  string repo_filter = 2;
  string file_filter = 3;
  string lang = 4;
  bool case_sensitive = 5;
  int32 limit = 6;
  int32 context_lines = 7;
  string output_mode = 8;
  map<string, string> repo_names = 9;
}

message SearchResponse {
  repeated Match matches = 1;
}

message Match {
  string repo = 1;
  string repo_path = 2;
  string file = 3;
  int32 line = 4;
  int32 column = 5;
  string text = 6;
  string before = 7;
  string after = 8;
}

message CountRequest {
  string pattern = 1;
  string repo_filter = 2;
  string lang = 3;
  string group_by = 4;
}

message CountResponse {
  repeated CountResult results = 1;
  int32 total = 2;
}

message CountResult {
  string group = 1;
  int32 count = 2;
}

message ValidateRequest {
  string pattern = 1;
}

message ValidateResponse {
  bool valid = 1;
  string parsed = 2;
  string error = 3;
  string hint = 4;
}

message PingRequest {}
message PingResponse {}

message ShutdownRequest {}
message ShutdownResponse {}
